  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
           background: #f4f3f0; color: #1a1a1a; line-height: 1.5; padding: 32px 16px; }
    .wrap { max-width: 1100px; margin: 0 auto; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .meta { color: #6b6560; font-size: 13px; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; align-items: start; }
    .card { background: white; border: 1px solid #d9d6cf; border-radius: 8px; overflow: hidden;
            display: flex; flex-direction: column;
            transition: box-shadow 0.15s, transform 0.15s; }
    .card:hover { box-shadow: 0 6px 16px rgba(0,0,0,0.08); transform: translateY(-2px); }
    .card-main { text-decoration: none; color: inherit; display: block; }
    .card-image { background: #fff; padding: 12px; }
    .card-image img { display: block; width: 100%; aspect-ratio: 1;
                      object-fit: cover; border-radius: 6px; background: #f4f3f0; }
    .card-image .no-img { display: flex; align-items: center; justify-content: center;
                          aspect-ratio: 1; font-size: 32px; opacity: 0.55; }
    .card-body { padding: 12px 14px; }
    .card-title { font-size: 14px; font-weight: 600; line-height: 1.3; margin-bottom: 4px;
                  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
                  overflow: hidden; }
    .card-meta { font-size: 12px; color: #6b6560; }
    .card-price { font-weight: 600; color: #1a1a1a; }

    /* Review block — only rendered when at least one review field is set */
    .card-review { padding: 10px 14px 14px; border-top: 1px solid #e8e5de;
                   font-size: 13px; color: #1a1a1a; }
    .review-text { white-space: pre-wrap; line-height: 1.5;
                   font-style: italic; color: #2d2d2d; }
    .review-photos { display: grid; grid-template-columns: repeat(3, 1fr);
                     gap: 4px; margin-top: 8px; }
    .review-photos img { width: 100%; aspect-ratio: 1; object-fit: cover;
                         border-radius: 4px; }
    .review-video { display: inline-block; margin-top: 8px; font-size: 12px;
                    color: #2d5a27; text-decoration: none; font-weight: 500; }
    .review-video:hover { text-decoration: underline; }

    footer { margin-top: 32px; font-size: 12px; color: #a8a29e; text-align: center; }
    footer a { color: inherit; }
  </style>
