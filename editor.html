<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog editor</title>
  <link rel="stylesheet" href="/assets/blog.css">
  <style>
    /* Editor chrome — only loaded locally, never part of a published post. */
    body { padding: 0; }
    .bar { position: sticky; top: 0; z-index: 10; display: flex; gap: 12px;
           align-items: center; flex-wrap: wrap;
           background: #1a1a1a; color: #fff; padding: 12px 20px; }
    .bar input { font: inherit; border: 1px solid #444; border-radius: 6px;
                 background: #2a2a2a; color: #fff; padding: 7px 10px; }
    .bar input.title { flex: 1; min-width: 220px; font-size: 15px; font-weight: 600; }
    .bar button { font: inherit; background: #2d5a27; color: #fff; border: 0;
                  border-radius: 6px; padding: 8px 16px; font-weight: 600; cursor: pointer; }
    .bar button:hover { filter: brightness(1.12); }
    .bar .navlink { color: #8fd17f; text-decoration: none; font-size: 14px; }
    .bar .navlink:hover { text-decoration: underline; }
    .bar .status { font-size: 13px; color: #a8a29e; }
    .bar .status a { color: #8fd17f; }
    .panes { display: grid; grid-template-columns: 1fr 1fr; gap: 0;
             height: calc(100vh - 58px); }
    .panes textarea { border: 0; border-right: 1px solid #d9d6cf; padding: 32px 24px;
                      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                      font-size: 14px; line-height: 1.6; resize: none; outline: none;
                      background: #fbfaf8; color: #1a1a1a; }
    .preview { overflow-y: auto; padding: 24px; }
    .preview .wrap { padding: 8px 0; }
    @media (max-width: 720px) { .panes { grid-template-columns: 1fr; height: auto; }
                                .panes textarea { min-height: 50vh; } }
    .fab { position: fixed; right: 24px; bottom: 24px; z-index: 20;
           width: 56px; height: 56px; border-radius: 50%;
           display: flex; align-items: center; justify-content: center;
           background: #2d5a27; color: #fff; text-decoration: none;
           font-size: 30px; line-height: 1; font-weight: 400;
           box-shadow: 0 4px 14px rgba(0,0,0,.28);
           transition: filter .12s, transform .12s; }
    .fab:hover { filter: brightness(1.12); transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="bar">
    <input class="title" id="title" placeholder="Post title" autocomplete="off">
    <input type="date" id="date">
    <button id="save">Save</button>
    <a class="navlink" href="/gallery.html">Images</a>
    <span class="status" id="status">Draft &middot; Save writes to /blog, then git push to publish</span>
  </div>
  <div class="panes">
    <textarea id="md" placeholder="# Write your post in Markdown&#10;&#10;Type here…"></textarea>
    <div class="preview">
      <div class="wrap"><div class="post-body" id="preview"></div></div>
    </div>
  </div>

  <a class="fab" id="fab" href="/editor.html" title="New post" aria-label="New post">+</a>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script>
    const $ = id => document.getElementById(id);

    // A YouTube link on its own line becomes a responsive inline player. This
    // runs before marked so the URL isn't autolinked first; marked then passes
    // the <div> through as a raw HTML block. The Markdown source keeps the
    // plain URL, so posts reload and re-render cleanly.
    const YT_ID = /(?:youtube\.com\/(?:watch\?(?:\S*&)?v=|shorts\/|embed\/)|youtu\.be\/)([\w-]{11})/;
    const ytEmbed = id =>
      '<div class="video-embed"><iframe src="https://www.youtube-nocookie.com/embed/' + id +
      '" title="YouTube video" loading="lazy" allow="accelerometer; autoplay; clipboard-write; ' +
      'encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>';
    const embedYouTube = md => (md || '').replace(
      /^[ \t]*(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:watch\?(?:\S*&)?v=|shorts\/|embed\/)|youtu\.be\/)([\w-]{11})\S*[ \t]*$/gm,
      (_, id) => '\n\n' + ytEmbed(id) + '\n\n');

    // The title field supplies the post's <h1>, so drop a leading body heading
    // to keep preview, published post, and listing showing the title once.
    const toBody = md => marked.parse(embedYouTube(md))
                          .replace(/^\s*<h1\b[^>]*>.*?<\/h1>\s*/is, '');
    const render = () => { $('preview').innerHTML = toBody($('md').value); };
    $('date').value = new Date().toISOString().slice(0, 10);

    // Track unsaved edits so the "New post" button can warn before discarding.
    let dirty = false;
    const markDirty = () => { dirty = true; };
    $('md').addEventListener('input', () => { render(); markDirty(); });
    $('title').addEventListener('input', markDirty);
    $('date').addEventListener('input', markDirty);

    // Paste an image: upload its bytes to the server, then drop a Markdown
    // image reference at the caret. A placeholder holds the spot while the
    // upload is in flight so two quick pastes can't clobber each other.
    const blobToB64 = blob => new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result.split(',', 2)[1]); // strip "data:…;base64,"
      r.onerror = reject;
      r.readAsDataURL(blob);
    });
    const insertAtCursor = (ta, text) => {
      const { selectionStart: s, selectionEnd: e } = ta;
      ta.value = ta.value.slice(0, s) + text + ta.value.slice(e);
      ta.selectionStart = ta.selectionEnd = s + text.length;
    };
    let pasteSeq = 0;
    $('md').addEventListener('paste', async e => {
      const item = [...(e.clipboardData?.items || [])]
                     .find(it => it.type.startsWith('image/'));
      if (!item) {
        // A pasted YouTube link (and nothing else) drops in as an inline player.
        // Requiring the whole clipboard to be the URL leaves links inside copied
        // prose untouched; the blank lines put it on its own block for the embed.
        const text = (e.clipboardData?.getData('text/plain') || '').trim();
        if (/^\S+$/.test(text) && YT_ID.test(text)) {
          e.preventDefault();
          insertAtCursor($('md'), '\n\n' + text + '\n\n');
          render(); markDirty();
        }
        return;                     // otherwise let the normal text paste run
      }
      e.preventDefault();
      const file = item.getAsFile();
      if (!file) return;
      const token = '![uploading #' + (++pasteSeq) + '…]()';
      insertAtCursor($('md'), token);
      render(); markDirty();
      try {
        const b64 = await blobToB64(file);
        const r = await fetch('/api/upload', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: $('title').value.trim(),
                                 mime: file.type, b64 })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || r.status);
        $('md').value = $('md').value.replace(token, '![](' + d.url + ')');
        $('status').textContent = 'Inserted ' + d.url; // clear any stale error
      } catch (err) {
        $('md').value = $('md').value.replace(token, '');
        $('status').textContent = 'Image upload failed: ' + err.message;
      }
      render();
    });

    // Edit an existing post via ?p=slug
    const slug = new URLSearchParams(location.search).get('p');
    if (slug) {
      fetch('/api/load?p=' + encodeURIComponent(slug))
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(p => { $('title').value = p.title; $('date').value = p.date || $('date').value;
                     $('md').value = p.markdown; render();
                     $('status').textContent = 'Editing ' + slug; })
        .catch(() => { $('status').textContent = 'Could not load "' + slug + '"'; });
    }

    $('save').addEventListener('click', async () => {
      const title = $('title').value.trim();
      if (!title) { $('status').textContent = 'Add a title first.'; $('title').focus(); return; }
      $('status').textContent = 'Saving…';
      try {
        const r = await fetch('/api/save', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, date: $('date').value,
                                 markdown: $('md').value,
                                 html: toBody($('md').value) })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || r.status);
        $('status').innerHTML = 'Saved &rarr; <a href="' + d.url + '" target="_blank">' +
                                d.url + '</a> &middot; now <code>git push</code>';
        history.replaceState(null, '', '?p=' + d.slug);
        dirty = false;
      } catch (e) { $('status').textContent = 'Error: ' + e.message; }
    });

    // New post: warn before discarding an unsaved draft.
    $('fab').addEventListener('click', e => {
      if (dirty && !confirm('Discard unsaved changes and start a new post?')) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
